<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Predict Hate Speech</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
margin:0;
display:flex;
align-items:center;
justify-content:center;

background:
linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.75)),
url("https://images.unsplash.com/photo-1614064641938-3bbee52942c7?auto=format&fit=crop&w=1600&q=80")
center/cover no-repeat fixed;
}

/* container */

.predict-box{
width:650px;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(12px);
border-radius:20px;
padding:35px;
color:white;
box-shadow:0 10px 30px rgba(0,0,0,0.35);
}

/* titles */

.page-title{
font-weight:700;
margin-bottom:10px;
text-align:center;
}

.model-title{
text-align:center;
margin-bottom:20px;
color:#93c5fd;
}

/* textarea */

textarea{
width:100%;
height:140px;
padding:12px;
border-radius:10px;
border:none;
resize:none;
}

/* button */

.btn-predict{
background:#16a34a;
border:none;
padding:10px;
font-weight:600;
margin-top:12px;
}

.btn-predict:hover{
background:#15803d;
}

/* result */

.result-box{
margin-top:20px;
padding:10px;
border-radius:10px;
font-weight:600;
text-align:center;
}

/* links */

.links{
margin-top:20px;
text-align:center;
}

.links a{
text-decoration:none;
padding:10px 16px;
border-radius:8px;
margin:5px;
background:#2563eb;
color:white;
display:inline-block;
}

.links a:hover{
background:#1d4ed8;
}

/* message */

.msg{
background:rgba(34,197,94,0.2);
padding:8px;
border-radius:8px;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="predict-box">

<h3 class="page-title">
<i class="bi bi-chat-dots-fill"></i> Hate Speech Prediction
</h3>

<h5 class="model-title">
Best AI Model Used: {{ model_name }}
</h5>

{% with messages = get_flashed_messages() %}
{% if messages %}
{% for msg in messages %}
<div class="msg"><b>{{ msg }}</b></div>
{% endfor %}
{% endif %}
{% endwith %}

<form method="post">

<label><b>Enter Text:</b></label>

<textarea name="text" required>{{ text }}</textarea>

<button class="btn btn-predict w-100">
<i class="bi bi-cpu"></i> Predict
</button>

</form>

{% if result %}

<div class="result-box bg-light text-dark">
Prediction Result: <b>{{ result }}</b>
</div>

{% endif %}

<div class="links">
<a href="/history"><i class="bi bi-clock-history"></i> Prediction History</a>
<a href="/logout"><i class="bi bi-box-arrow-right"></i> Logout</a>
</div>

</div>

</body>
</html>
