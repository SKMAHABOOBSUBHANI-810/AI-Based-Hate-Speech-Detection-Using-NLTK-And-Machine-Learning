<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>User Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
margin:0;
display:flex;
align-items:center;
justify-content:center;
position:relative;
overflow:hidden;
background:
linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.75)),
url("https://images.unsplash.com/photo-1614064641938-3bbee52942c7?auto=format&fit=crop&w=1600&q=80")
center/cover no-repeat fixed;
}

body::before,
body::after{
content:"";
position:absolute;
width:240px;
height:240px;
border-radius:50%;
filter:blur(70px);
opacity:0.25;
animation:floatGlow 8s ease-in-out infinite alternate;
}

body::before{
background:#2563eb;
top:-50px;
left:-40px;
}

body::after{
background:#ec4899;
right:-40px;
bottom:-50px;
animation-duration:10s;
}

@keyframes floatGlow{
from {transform:translate(0,0) scale(1);} 
to {transform:translate(20px,30px) scale(1.08);} 
}

.register-box{
width:450px;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,0.16);
border-radius:20px;
padding:35px;
color:white;
box-shadow:0 15px 40px rgba(0,0,0,0.35);
animation:fadeUp 0.9s ease;
}

.register-title{
font-weight:700;
margin-bottom:20px;
text-align:center;
}

.input-group{
margin-bottom:15px;
}

.input-group-text{
background:linear-gradient(135deg,#2563eb,#60a5fa);
color:white;
border:none;
}

.form-control{
border-radius:8px;
transition:0.3s ease;
}

.form-control:focus{
box-shadow:0 0 0 0.2rem rgba(96,165,250,0.25);
border-color:#60a5fa;
}

.btn-register{
background:linear-gradient(135deg,#16a34a,#22c55e);
border:none;
font-weight:600;
padding:10px;
transition:0.3s ease;
}

.btn-register:hover{
background:linear-gradient(135deg,#15803d,#16a34a);
transform:translateY(-2px);
box-shadow:0 8px 20px rgba(34,197,94,0.25);
}

.msg{
background:rgba(34,197,94,0.2);
padding:8px;
border-radius:8px;
margin-bottom:10px;
}

.links{
margin-top:15px;
text-align:center;
}

.links a{
color:#60a5fa;
text-decoration:none;
transition:0.3s ease;
}

.links a:hover{
text-decoration:underline;
color:#bfdbfe;
}

@keyframes fadeUp{
from {opacity:0; transform:translateY(20px);} 
to {opacity:1; transform:translateY(0);} 
}

</style>
</head>

<body>

<div class="register-box">

<h3 class="register-title">
<i class="bi bi-shield-check"></i> Hate Speech Detection – User Registration
</h3>

{% with messages = get_flashed_messages() %}
{% if messages %}
{% for msg in messages %}
<div class="msg">
<b>{{ msg }}</b>
</div>
{% endfor %}
{% endif %}
{% endwith %}

<form method="post">

<div class="input-group">
<span class="input-group-text"><i class="bi bi-person"></i></span>
<input type="text" name="username" class="form-control" placeholder="Enter Username" required>
</div>

<div class="input-group">
<span class="input-group-text"><i class="bi bi-lock"></i></span>
<input type="password" name="password" class="form-control" placeholder="Enter Password" required>
</div>

<div class="input-group">
<span class="input-group-text"><i class="bi bi-envelope"></i></span>
<input type="email" name="email" class="form-control" placeholder="Enter Email" required>
</div>

<div class="input-group">
<span class="input-group-text"><i class="bi bi-telephone"></i></span>
<input type="text" name="mobile" class="form-control" placeholder="Enter Phone Number">
</div>

<div class="input-group">
<span class="input-group-text"><i class="bi bi-house-door"></i></span>
<textarea name="address" class="form-control" rows="3" placeholder="Enter Address"></textarea>
</div>

<button class="btn btn-register w-100">
<i class="bi bi-person-plus-fill"></i> Register
</button>

</form>

<div class="links">
<p>Already registered? <a href="/login">Login</a></p>
<p><a href="/">Back to Home</a></p>
</div>

</div>

</body>
</html>
