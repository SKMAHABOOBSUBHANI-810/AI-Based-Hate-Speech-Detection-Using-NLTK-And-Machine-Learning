<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Hate Speech Detection</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>

body{
margin:0;
min-height:100vh;
overflow:hidden;
font-family:'Poppins',sans-serif;
position:relative;
background:
linear-gradient(rgba(0,0,0,0.72),rgba(0,0,0,0.72)),
url("https://images.unsplash.com/photo-1611605698335-8b1569810432?auto=format&fit=crop&w=1600&q=80")
center/cover no-repeat fixed;
color:white;
}

body::before,
body::after{
content:"";
position:absolute;
width:280px;
height:280px;
border-radius:50%;
filter:blur(80px);
opacity:0.35;
animation:floatGlow 8s ease-in-out infinite alternate;
}

body::before{
background:#2563eb;
top:-60px;
left:-60px;
}

body::after{
background:#8b5cf6;
right:-40px;
bottom:-60px;
animation-duration:10s;
}

@keyframes floatGlow{
from {transform:translate(0,0) scale(1);} 
to {transform:translate(20px,40px) scale(1.08);} 
}

.navbar-custom{
position:absolute;
top:20px;
right:40px;
z-index:2;
}

.navbar-custom a{
text-decoration:none;
color:white;
margin-left:15px;
padding:10px 16px;
border-radius:999px;
font-weight:500;
transition:0.3s ease;
backdrop-filter:blur(10px);
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.12);
}

.navbar-custom a:hover{
background:linear-gradient(135deg,#2563eb,#60a5fa);
transform:translateY(-2px);
box-shadow:0 8px 20px rgba(37,99,235,0.35);
}

.hero{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
position:relative;
z-index:1;
}

.hero .hero-box{
background:rgba(255,255,255,0.10);
backdrop-filter:blur(16px);
border:1px solid rgba(255,255,255,0.16);
border-radius:24px;
padding:40px 50px;
box-shadow:0 20px 50px rgba(0,0,0,0.25);
animation:fadeUp 1s ease;
}

.hero h1{
font-size:48px;
font-weight:800;
line-height:1.3;
text-shadow:0 2px 10px rgba(0,0,0,0.25);
}

.hero span{
color:#60a5fa;
}

.hero p{
margin-top:15px;
font-size:18px;
color:#d1d5db;
}

@keyframes fadeUp{
from {opacity:0; transform:translateY(20px);} 
to {opacity:1; transform:translateY(0);} 
}

</style>
</head>

<body>

<!-- top right navigation -->

<div class="navbar-custom">

<a href="/register">
<i class="bi bi-person-plus"></i> Register
</a>

<a href="/login">
<i class="bi bi-box-arrow-in-right"></i> User Login
</a>

<a href="/admin">
<i class="bi bi-person-lock"></i> Admin Login
</a>

</div>

<!-- center title -->

<div class="hero">

<div class="hero-box">

<h1>
AI-Based <span>Hate Speech Detection</span><br>
Using NLTK and Machine Learning
</h1>

<p>
Detect hate speech, offensive language, and normal text  
from social media posts like Twitter, Instagram, and Facebook.
</p>

</div>

</div>

</body>
</html>
